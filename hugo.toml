baseURL = "https://xsummer624-gif.github.io/"
languageCode = "zh-cn"
title = "sunny"
theme = "PaperMod"
defaultContentLanguage = "zh"

# 启用搜索功能（PaperMod 需要 JSON 输出）
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Markdown 渲染配置
[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true
    guessSyntax = true
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    startLevel = 2
    ordered = false

# PaperMod 主题参数
[params]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowToc = true
  TocOpen = false
  disableThemeToggle = false
  description = "记录每天的学习与思考"

  # 首页个人介绍
  [params.homeInfoParams]
    Title = "Take me on"
    Content = ""
    Image = "/images/home-bg.jpg"
    ImageAlt = "Home illustration"

  # 搜索功能
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# 编辑文章快捷链接
[params.editPost]
  URL = "https://github.com/xsummer624-gif/xsummer624-gif.github.io/tree/main/content"
  Text = "Suggest Changes"
  appendFilePath = true

# 导航栏菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 50
